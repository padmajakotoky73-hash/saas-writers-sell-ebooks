name: SaaS Writers Sell eBooks CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        node-version: [20]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
        pip install pytest pytest-cov

    - name: Run FastAPI tests
      run: |
        pytest --cov=app --cov-report=xml

    - name: Install Node.js dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run Next.js tests
      working-directory: ./frontend
      run: npm test

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Trivy container scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'python:3.12-slim'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: Snyk security scan
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: test
        args: --all-projects --severity-threshold=high

    - name: OWASP ZAP baseline scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:8000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-config api.disablekey=true'

  migrations:
    runs-on: ubuntu-latest
    needs: security
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install alembic sqlalchemy

    - name: Run Alembic migrations
      run: |
        alembic upgrade head

  docs:
    runs-on: ubuntu-latest
    needs: migrations
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install fastapi openapi-schema-pydantic

    - name: Generate OpenAPI docs
      run: |
        python -c "from app.main import app; import json; open('openapi.json', 'w').write(json.dumps(app.openapi()))"

  deploy_backend:
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Install Railway CLI
      run: |
        curl -fsSL https://cli.railway.app/install.sh | sh

    - name: Deploy to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        railway up --detach

  deploy_frontend:
    runs-on: ubuntu-latest
    needs: deploy_backend
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Install Vercel CLI
      run: |
        npm install -g vercel

    - name: Deploy to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        cd frontend
        vercel --prod --confirm